<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 1</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0d0d0d; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .flashing-dot { width: 45px; height: 45px; background-color: #ff0000; border-radius: 50%; box-shadow: 0 0 25px #ff0000; animation: pulse 1.2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 1; } }
        #secret-target { position: absolute; width: 60px; height: 60px; background-color: #222222; border-radius: 4px; cursor: default; }
    </style>
</head>
<body>
    <div class="flashing-dot"></div>
    <div id="secret-target"></div>
    <script>
        window.onload = function() {
            const target = document.getElementById('secret-target');
            target.style.top = (Math.floor(Math.random() * 70) + 15) + '%';
            target.style.left = (Math.floor(Math.random() * 70) + 15) + '%';
            target.addEventListener('click', function() { window.location.href = '../level2/'; });
        };
    </script>
</body>
</html>
