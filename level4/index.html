<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 4 - Final Firewall</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0d0d0d; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; font-family: 'Segoe UI', sans-serif; color: #fff; }
        .flashing-dot { width: 45px; height: 45px; background-color: #ff0000; border-radius: 50%; box-shadow: 0 0 25px #ff0000; animation: pulse 1.2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 1; } }
        #secret-target { position: absolute; width: 18px; height: 18px; background-color: #0f0f0f; border-radius: 2px; cursor: default; }
        
        #victory-screen { 
            display: none; background: #09140e; border: 2px solid #00ff66; padding: 40px 60px; border-radius: 8px; text-align: center; box-shadow: 0 0 40px rgba(0, 255, 102, 0.2);
            animation: secureFadeIn 0.5s ease-out;
        }
        @keyframes secureFadeIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .success-icon { font-size: 4rem; color: #00ff66; margin-bottom: 15px; }
        h1 { color: #00ff66; font-size: 2.8rem; margin: 0 0 10px 0; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 255, 102, 0.4); }
        p { color: #a2c4b0; font-size: 1.1rem; margin-bottom: 30px; }
        .replay-btn { background: #00ff66; border: none; color: #050f0a; padding: 12px 30px; font-size: 1rem; font-weight: bold; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .replay-btn:hover { background: #00cc52; box-shadow: 0 0 20px rgba(0, 255, 102, 0.5); }
    </style>
</head>
<body>
    <div class="flashing-dot" id="dot"></div>
    <div id="secret-target"></div>

    <div id="victory-screen">
        <div class="success-icon">✓</div>
        <h1>SYSTEM OFFLINE</h1>
        <p>Terminal terminated. You conquered all levels of the Burger Client firewall.</p>
        <button class="replay-btn" onclick="window.location.href='../'">Main Menu</button>
    </div>

    <script>
        window.onload = function() {
            const target = document.getElementById('secret-target');
            const dot = document.getElementById('dot');
            const victory = document.getElementById('victory-screen');

            target.style.top = (Math.floor(Math.random() * 70) + 15) + '%';
            target.style.left = (Math.floor(Math.random() * 70) + 15) + '%';

            target.addEventListener('click', function() {
                dot.style.display = 'none';
                target.style.display = 'none';
                document.body.style.backgroundColor = '#040705';
                victory.style.display = 'block';
            });
        };
    </script>
</body>
</html>
