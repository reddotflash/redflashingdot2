<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 4 - Core Sector</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            /* Intense Crimson Gradient */
            background: linear-gradient(135deg, #24020a 0%, #080204 100%); 
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; font-family: 'Consolas', sans-serif; color: #fff; 
        }
        .status-bar { position: absolute; top: 0; left: 0; width: 100%; background: rgba(20, 10, 12, 0.8); backdrop-filter: blur(5px); border-bottom: 2px solid #ff0055; box-shadow: 0 0 15px rgba(255, 0, 85, 0.3); padding: 12px 20px; display: flex; justify-content: space-between; box-sizing: border-box; z-index: 10; color: #ff0055; font-weight: bold; font-size: 0.9rem; letter-spacing: 2px; }
        .progress-container { display: flex; align-items: center; gap: 5px; }
        .node { width: 12px; height: 12px; border: 1px solid #333; background: #222; border-radius: 2px; }
        .node.active { background: #ff0055; box-shadow: 0 0 8px #ff0055; border-color: #ff0055; }
        
        .flashing-dot { width: 45px; height: 45px; background-color: #ff0055; border-radius: 50%; box-shadow: 0 0 25px #ff0055; animation: pulse 1.2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 1; } }

        /* Microscopic dark drop-shadow square */
        #secret-target { position: absolute; width: 16px; height: 16px; background-color: rgba(0, 0, 0, 0.5); border-radius: 2px; cursor: default; }
        
        #victory-screen { 
            display: none; background: #07150f; border: 2px solid #00ff66; padding: 45px 50px; border-radius: 8px; text-align: center; box-shadow: 0 0 40px rgba(0, 255, 102, 0.25);
            animation: secureFadeIn 0.5s ease-out; z-index: 20;
        }
        @keyframes secureFadeIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .success-icon { font-size: 4rem; color: #00ff66; margin-bottom: 15px; }
        h1 { color: #00ff66; font-size: 2.5rem; margin: 0 0 10px 0; letter-spacing: 3px; text-shadow: 0 0 15px rgba(0, 255, 102, 0.4); }
        p { color: #a2c4b0; font-size: 1rem; margin-bottom: 30px; letter-spacing: 1px; }
        .replay-btn { background: #00ff66; border: none; color: #050f0a; padding: 14px 35px; font-size: 1rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .replay-btn:hover { background: #fff; box-shadow: 0 0 25px rgba(0, 255, 102, 0.6); }
    </style>
</head>
<body>
    <div class="status-bar" id="top-bar">
        <span>BURGER_TERMINAL // SECURITY_CORE</span>
        <div class="progress-container">
            <span>PROGRESS: </span>
            <div class="node active"></div><div class="node active"></div><div class="node active"></div><div class="node active"></div><div class="node active"></div>
        </div>
    </div>

    <div class="flashing-dot" id="dot"></div>
    <div id="secret-target"></div>

    <div id="victory-screen">
        <div class="success-icon">✓</div>
        <h1>DEACTIVATION COMPLETE</h1>
        <p>Terminal offline. All Burger Client layers have been terminated.</p>
        <button class="replay-btn" onclick="window.location.href='../'">Main Menu</button>
    </div>

    <script>
        window.onload = function() {
            const target = document.getElementById('secret-target');
            const dot = document.getElementById('dot');
            const victory = document.getElementById('victory-screen');
            const bar = document.getElementById('top-bar');

            target.style.top = (Math.floor(Math.random() * 60) + 20) + '%';
            target.style.left = (Math.floor(Math.random() * 70) + 15) + '%';

            target.addEventListener('click', function() {
                dot.style.display = 'none';
                target.style.display = 'none';
                bar.style.display = 'none';
                document.body.style.background = '#030504';
                victory.style.display = 'block';
            });
        };
    </script>
</body>
</html>
