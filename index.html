<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Client - Terminal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* Subtle glowing background grid effect */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 0, 0, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        .menu-container {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            animation: glitch 3s infinite;
        }

        p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .play-btn {
            background: transparent;
            border: 2px solid #ff0000;
            color: #fff;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            background: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            transform: scale(1.05);
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg); }
            20% { transform: skew(-1deg); }
            21% { transform: skew(1deg); }
            70% { transform: skew(0deg); }
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Burger Client</h1>
        <p>SYSTEM TERMINAL OVERRIDE</p>
        <button class="play-btn" onclick="window.location.href='./level0/'">Initialize Play</button>
    </div>

</body>
</html>
