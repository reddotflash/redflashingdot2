<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 0 - Protocol</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0d0d0d; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; font-family: 'Segoe UI', sans-serif; }
        .flashing-dot { width: 45px; height: 45px; background-color: #ff0000; border-radius: 50%; box-shadow: 0 0 25px #ff0000; animation: pulse 1.2s infinite ease-in-out; }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.3; box-shadow: 0 0 10px #ff0000; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 30px #ff0000; }
            100% { transform: scale(0.9); opacity: 0.3; box-shadow: 0 0 10px #ff0000; }
        }
        #secret-target { position: absolute; width: 80px; height: 80px; background-color: #333333; border-radius: 4px; cursor: default; }
        .tutorial-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s ease; }
        .tutorial-box { background: #141414; border: 1px solid #333; padding: 30px; border-radius: 8px; text-align: center; max-width: 400px; }
        .tutorial-box h2 { color: #ff0000; margin-top: 0; }
        .tutorial-box p { color: #aaa; line-height: 1.5; margin-bottom: 25px; }
        .start-btn { background: #ff0000; border: none; color: white; padding: 10px 25px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tutorial-overlay" id="tutorial">
        <div class="tutorial-box">
            <h2>HOW TO PLAY</h2>
            <p>Find the <strong>faintly discolored square</strong> hidden randomly on your screen and click it to turn off the terminal light. <br><br>Each level gets significantly smaller and harder to see!</p>
            <button class="start-btn" onclick="closeTutorial()">Start Mission</button>
        </div>
    </div>
    <div class="flashing-dot"></div>
    <div id="secret-target"></div>
    <script>
        function closeTutorial() {
            document.getElementById('tutorial').style.opacity = '0';
            setTimeout(() => document.getElementById('tutorial').style.display = 'none', 500);
        }
        window.onload = function() {
            const target = document.getElementById('secret-target');
            target.style.top = (Math.floor(Math.random() * 70) + 15) + '%';
            target.style.left = (Math.floor(Math.random() * 70) + 15) + '%';
            target.addEventListener('click', function() { window.location.href = '../level1/'; });
        };
    </script>
</body>
</html>
